name: Django CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Tests
      run: |
        python manage.py test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - name: Simulate Deployment
      run: echo "Deploying the application... (Simulated)"

  notify_discord:
    runs-on: ubuntu-latest
    needs: [test] # Or [test, deploy] if you want it after deployment
    if: always() # Run even if previous steps fail
    steps:
    - name: Discord notification
      uses: Ilshidur/action-discord@master
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      with:
        args: 'The project {{ EVENT_PAYLOAD.repository.full_name }} has been updated. Status of tests: ${{ needs.test.result }}. Triggered by: ${{ github.actor }}'
