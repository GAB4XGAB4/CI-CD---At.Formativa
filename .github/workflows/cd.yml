name: CD

on:
  workflow_run:
    workflows: ['CI']
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  build-artifact:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build delivery package
        run: |
          mkdir package
          cp -r PsicoNote core manage.py requirements.txt README.md package/

      - name: Upload delivery artifact
        uses: actions/upload-artifact@v4
        with:
          name: psicodoc-delivery
          path: package

  deploy:
    needs: build-artifact
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Deployment marker
        run: echo "Deployment job executed successfully."